// ───────────────────────────── ITINERARY TAB ─────────────────────────────

function ItineraryTab() {
  const [filter, setFilter] = useState("all");
  const [exp, setExp] = useState(new Set());

  const toggle = (id) => {
    const n = new Set(exp); n.has(id) ? n.delete(id) : n.add(id); setExp(n);
  };
  const shown = filter === "all" ? days : days.filter(d => d.phase === filter);
  const allOpen = shown.length > 0 && shown.every(d => exp.has(d.id));
  const toggleAll = () => {
    const n = new Set(exp); shown.forEach(d => allOpen ? n.delete(d.id) : n.add(d.id)); setExp(n);
  };

  return (
    <div>
      {/* Stay summary */}
      <div className="bg-white rounded-xl p-4 mb-4 shadow-sm border border-gray-200">
        <p className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Stay Summary</p>
        <div className="flex flex-wrap gap-2 text-xs">
          {[
            { l:"🇩🇪 Düsseldorf", n:"2 nights", c:"bg-blue-100 text-blue-800" },
            { l:"🇪🇸 Barcelona", n:"4 nights", c:"bg-rose-100 text-rose-800" },
            { l:"🏝️ Ibiza", n:"3 nights", c:"bg-violet-100 text-violet-800" },
            { l:"🍺 Munich", n:"5 nights", c:"bg-amber-100 text-amber-800" },
            { l:"🇩🇪 Düsseldorf", n:"1 night", c:"bg-blue-100 text-blue-800" }
          ].map((s,i,a) => (
            <span key={i} className="flex items-center gap-1">
              <span className={`rounded-full px-3 py-1 font-medium ${s.c}`}>{s.l} · {s.n}</span>
              {i < a.length-1 && <span className="text-gray-300">›</span>}
            </span>
          ))}
        </div>
      </div>

      {/* Filters */}
      <div className="flex flex-wrap gap-2 mb-3 items-center">
        {filters.map(f => (
