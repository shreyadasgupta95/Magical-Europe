                                <div key={i} className="flex flex-wrap gap-1.5 items-center">
                                  <span className="font-semibold text-sm text-gray-800">{opt.mode}</span>
                                  <span className="bg-emerald-100 text-emerald-700 rounded-full px-2 py-0.5 text-xs font-medium">⏱ {opt.dur}</span>
                                  <span className="bg-blue-100 text-blue-700 rounded-full px-2 py-0.5 text-xs font-medium">💶 {opt.cost}</span>
                                  <span className="text-gray-400 text-xs">{opt.note}</span>
                                </div>
                              ))}
                            </div>
                          </div>
                        )}

                        {day.tip && (
                          <div className="mt-3 bg-yellow-50 border border-yellow-200 rounded-lg p-3">
                            <p className="text-xs text-yellow-900 leading-relaxed">
                              <span className="font-bold">💡 Tip: </span>{day.tip}
                            </p>
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            <div className="mt-5 bg-white rounded-xl border border-red-200 p-4 shadow-sm">
              <h3 className="font-bold text-red-700 mb-3 text-sm">🚨 Book These Immediately</h3>
              <div className="space-y-2">
                {bookings.map((b, i) => (
                  <div key={i} className="flex gap-2 text-sm text-gray-700">
                    <span className="shrink-0">{b.icon}</span>
                    <span>{b.text}</span>
                  </div>
                ))}
              </div>
            </div>

            <div className="mt-3 bg-white rounded-xl border border-gray-200 p-4 shadow-sm">
              <h3 className="font-bold text-gray-800 mb-3 text-sm">💶 Estimated Budget (per person)</h3>
              <div className="space-y-1.5 text-sm">
                {costs.map((r, i) => (
                  <div key={i} className="flex justify-between gap-3">
                    <span className="text-gray-500">{r.label}</span>
                    <span className="font-semibold text-gray-800 shrink-0">{r.range}</span>
                  </div>
                ))}
                <div className="border-t border-gray-200 pt-2 mt-2 flex justify-between font-bold text-gray-900">
                  <span>Estimated Total</span>
                  <span>€2,150–5,000+</span>
                </div>
              </div>
              <p className="text-xs text-gray-400 mt-2">Note: Ibiza and Munich during Oktoberfest are premium-priced. Booking early significantly reduces costs.</p>
            </div>

            <p className="text-center text-xs text-gray-400 mt-4 mb-2">Bon voyage! 🌍</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
